name: vivo_pad_chat
description: 专为 vivo Pad5 Pro 优化的智能聊天应用
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 状态管理
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # 网络
  dio: ^5.4.3
  web_socket_channel: ^2.4.5
  
  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # 多媒体
  image_picker: ^1.1.2
  photo_view: ^0.14.0
  
  # UI 组件
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  
  # 工具
  intl: ^0.19.0
  uuid: ^4.4.0
  logger: ^2.3.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  hive_generator: ^2.0.1
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
